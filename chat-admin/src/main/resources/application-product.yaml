server:
  servlet:
    context-path: /admin
  port: 1001

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/elovchat?allowPublicKeyRetrieval=true&useUnicode=true&useSSL=false&characterEncoding=utf8
    username: root
    password: 123456

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 10s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

mybatis:
  mapper-locations: classpath:mapper/*.xml

sa-token:
  token-name: Admin-Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: true
